name: test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  unittest:
    runs-on: macos-latest
    timeout-minutes: 10
    strategy:
      matrix:
        python-version: ["3.9", "3.13"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m py_compile chrome_to_safari.py tests/test_chrome_to_safari.py
      - run: python -m unittest discover -s tests -v
      - run: bash -n sync_bookmarks.sh install_launch_agent.sh uninstall_launch_agent.sh
      - run: python -m pip install .
      - run: chrome-safari-bookmarks-sync --help
