name: test

on:
  push:
  pull_request:

jobs:
  unittest:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m py_compile chrome_to_safari.py tests/test_chrome_to_safari.py
      - run: python -m unittest discover -s tests -v
