name: test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  unittest:
    runs-on: macos-latest
    timeout-minutes: 10
    strategy:
      matrix:
        python-version: ["3.9", "3.13"]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m py_compile chrome_to_safari.py tests/test_chrome_to_safari.py
      - run: python -m unittest discover -s tests -v
      - run: bash -n sync_bookmarks.sh install_launch_agent.sh uninstall_launch_agent.sh
      - run: python -m pip install .
      - run: chrome-safari-bookmarks-sync --help
